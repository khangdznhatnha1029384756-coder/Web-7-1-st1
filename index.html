<head>

    <title>Diễn Đàn 7/1 - Professional Forum</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Biến màu sắc để đổi Theme */
        :root {
            --bg-body: #0b0b0b;
            --bg-card: #1a1a1a;
            --text-color: #ffffff;
            --border-color: #333;
            --galaxy: linear-gradient(-45deg, #0f0c29, #302b63, #8a2387, #e94057, #f27121);
        }

        .light-theme {
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --text-color: #1c1e21;
            --border-color: #ddd;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-color);
            transition: 0.3s;
        }

        /* --- HEADER GALAXY --- */
        header {
            background: var(--galaxy);
            background-size: 400% 400%;
            animation: galaxyAnim 10s ease infinite;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        header h1 { margin: 0; color: white; letter-spacing: 3px; font-size: 1.8rem; }

        @keyframes galaxyAnim {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- LAYOUT CHÍNH (NGANG) --- */
        .container {
            display: flex;
            max-width: 1200px;
            margin: 20px auto;
            gap: 20px;
            padding: 0 15px;
        }

        /* Cột trái: Thông báo */
        .sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Cột phải: Bài đăng */
        .main-feed { flex: 2.5; }

        /* --- THÔNG BÁO QUAN TRỌNG --- */
        .announcement-box {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #e94057;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .announcement-box h3 {
            margin-top: 0;
            color: #e94057;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* --- DEV INFO --- */
        .dev-card {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 15px;
            font-size: 0.9rem;
            border: 1px solid var(--border-color);
        }

        /* --- AUTH BOX (LOGIN) --- */
        .auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .galaxy-element {
            background: linear-gradient(180deg, #2d5bff 0%, #ffffff 45%, #ffffff 55%, #d946ef 100%);
            border-radius: 20px;
            padding: 30px;
            width: 350px;
            text-align: center;
            color: #333;
        }

        /* --- POST CARD --- */
        .post-card {
            background: var(--bg-card);
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .post-header { padding: 15px; font-weight: bold; color: #00ffcc; border-bottom: 1px solid var(--border-color); }
        .post-desc { padding: 15px; }
        .post-media img, .post-media video { width: 100%; display: block; }

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diễn Đàn 7/1 - Hffiuff Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* THIẾT LẬP GỐC - ĐẢM BẢO LUÔN THẤY CHỮ */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #000000; /* Nền đen tuyền */
            color: #ffffff; /* Chữ trắng rõ ràng */
            transition: 0.3s;
        }

        /* Chế độ sáng (Nếu bấm nút mới đổi) */
        .light-mode {
            background-color: #ffffff !important;
            color: #000000 !important;
        }

        /* HEADER GALAXY 7/1 */
        .header {
            background: linear-gradient(-45deg, #0f0c29, #302b63, #8a2387, #e94057, #f27121);
            background-size: 400% 400%;
            animation: moveGalaxy 8s infinite;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        @keyframes moveGalaxy {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header h1 { margin: 0; font-size: 24px; color: #fff; letter-spacing: 3px; }

        /* BỐ CỤC NGANG */
        .main-container {
            display: flex;
            max-width: 1100px;
            margin: 20px auto;
            gap: 20px;
            padding: 0 10px;
        }

        /* CỘT TRÁI: THÔNG BÁO & DEV */
        .left-sidebar {
            flex: 1;
        }
        .info-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .light-mode .info-card { background: #f9f9f9; border: 1px solid #ddd; }

        /* CỘT PHẢI: DIỄN ĐÀN */
        .right-content {
            flex: 2;
        }

        /* KHUNG ĐĂNG BÀI */
        .post-box {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            border: 1px solid #444;
        }
        textarea {
            width: 100%;
            background: #000;
            color: #fff;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 8px;
            height: 80px;
            box-sizing: border-box;
        }
        .light-mode textarea { background: #fff; color: #000; }

        .btn-post {
            background: #d946ef;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        /* BÀI ĐĂNG (POST CARD) */
        .card {
            background: #111;
            border: 1px solid #222;
            border-radius: 15px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .light-mode .card { background: #fff; border: 1px solid #eee; box-shadow: 0 2px 5px #ccc; }

        .card-header { padding: 12px; font-weight: bold; color: #00ffcc; border-bottom: 1px solid #222; }
        .card-body { padding: 15px; }
        .card-media img, .card-media video { width: 100%; display: block; max-height: 450px; object-fit: contain; background: #000; }

        /* BÌNH LUẬN */
        .comment-area { padding: 10px; background: #0a0a0a; border-top: 1px solid #222; }
        .comment-text { font-size: 13px; color: #bbb; margin-bottom: 5px; }

        /* AUTH OVERLAY */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999; display: flex; justify-content: center; align-items: center;
        }
        .login-box {
            background: linear-gradient(180deg, #2d5bff, #ffffff, #d946ef);
            padding: 30px; border-radius: 20px; width: 300px; text-align: center; color: #000;
        }
        .login-box input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box;}

        @media (max-width: 700px) { .main-container { flex-direction: column; } }
    </style>
</head>

            <input type="password" id="u-pass" placeholder="Mật khẩu">
            <button class="btn-post" style="width:100%; background: #000;" onclick="doLogin()">VÀO DIỄN ĐÀN</button>
